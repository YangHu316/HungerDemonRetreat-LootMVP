name: GUT Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GODOT_VERSION: 4.6.2

    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Download Godot
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          set -eu
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Verify Godot
        run: godot --version

      - name: Import resources (headless)
        run: |
          godot --headless --path . --import || true

      - name: Run GUT tests
        run: |
          godot --headless --path . -s addons/gut/gut_cmdln.gd -gconfig=res://.gutconfig.json

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gut-junit
          path: test_results.xml
          if-no-files-found: warn
